services:
  - type: web
    name: infinite-streams
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@10.26.1 && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz

    envVars:
      - key: NODE_ENV
        value: production

      - key: SESSION_SECRET
        generateValue: true

      # TMDB API key — required for the "INFINITE STREAMS" movies/series catalog.
      # Get a free key at https://www.themoviedb.org/settings/api
      - key: TMDB_API_KEY
        sync: false

      # Set this to your Render app URL (e.g. https://infinite-streams.onrender.com)
      # so the NetMirror proxy returns correct stream URLs.
      - key: PUBLIC_URL
        sync: false

      # Optional: override the HDHub4U base URL if the default stops working.
      - key: HDHUB4U_URL
        sync: false

      # ── Cloudflare Worker proxy (REQUIRED for full provider support on cloud IPs) ──
      # Routes CF-blocked providers (AnimeSalt, RareAnime, AnimeDekho, ZinkMovies,
      # DahmerMovies, MovieBox) through a Cloudflare Worker so requests originate
      # from Cloudflare's IP range instead of this server's AWS IP.
      #
      # Setup (free, 5 min):
      #   1. Go to https://workers.cloudflare.com
      #   2. Create a new Worker → paste cloudflare-worker/proxy.js → Deploy
      #   3. Copy the *.workers.dev URL and set it here
      - key: CF_WORKER_URL
        sync: false

      # Optional: full HTTPS proxy URL for ALL outbound requests.
      # Format: http://user:pass@host:port
      # Use a residential proxy service (BrightData, IPRoyal, etc.) for best results.
      - key: HTTPS_PROXY
        sync: false
